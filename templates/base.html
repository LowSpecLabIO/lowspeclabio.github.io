<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ site_description }}">
    <meta property="og:title" content="{{ page_title }}">
    <meta property="og:description" content="{{ site_description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="alternate" type="application/rss+xml" title="{{ site_name }}" href="{{ base_path }}/feed.xml">
    <link rel="stylesheet" href="{{ base_path }}/css/style.css">
    <link rel="sitemap" href="{{ base_path }}/sitemap.xml">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "{{ site_name }}",
        "url": "{{ site_url }}",
        "description": "{{ site_description }}"
    }
    </script>
</head>
<body>
    <header>
        <nav>
            <a href="{{ base_path }}/" class="logo">{{ site_name }}</a>
            <div class="nav-links">
                <a href="{{ base_path }}/">Home</a>
                <a href="{{ base_path }}/#guides">Guides</a>
                <a href="{{ base_path }}/feed.xml">RSS</a>
            </div>
        </nav>
    </header>
    <main>
        {{ hero }}
        {{ content }}
    </main>
    <footer>
        <p>&copy; 2026 {{ site_name }}. {{ site_tagline }}</p>
    </footer>
</body>
</html>
