<article class="post-full">
    <header class="post-header">
        <h1>{{ title }}</h1>
        <div class="post-meta">
            <time datetime="{{ date }}">{{ date }}</time>
            <span class="category">{{ category }}</span>
        </div>
    </header>
    <div class="post-body">
{{{ body }}}
    </div>
</article>
